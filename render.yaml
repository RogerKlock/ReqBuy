services:
  - type: web
    name: reqbuy-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: reqbuy-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: IP_HASH_SALT
        generateValue: true
      - key: AUDIT_RETENTION_DAYS
        value: "90"
      - key: FRONTEND_URL
        sync: false # Definir manualmente após deploy do Vercel

databases:
  - name: reqbuy-db
    databaseName: reqbuy
    plan: free
